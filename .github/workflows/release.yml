name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - rid: osx-arm64
            os: macos-latest
          - rid: osx-x64
            os: macos-latest
          - rid: linux-x64
            os: ubuntu-latest
          - rid: linux-arm64
            os: ubuntu-latest
          - rid: win-x64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    env:
      ARTIFACT_NAME: FileDeduplicator-${{ github.ref_name }}-${{ matrix.rid }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Publish
        run: dotnet publish FileDeduplicator/FileDeduplicator.csproj -c Release -r ${{ matrix.rid }} -o publish/${{ matrix.rid }}

      - name: Create zip (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd publish/${{ matrix.rid }}
          zip -r ../../${{ env.ARTIFACT_NAME }}.zip .

      - name: Create zip (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath ${{ env.ARTIFACT_NAME }}.zip

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_NAME }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: artifacts/*.zip
